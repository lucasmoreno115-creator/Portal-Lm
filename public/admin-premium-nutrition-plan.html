<!doctype html>
<html lang="pt-BR"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Planejamento alimentar | LM Premium</title><link rel="stylesheet" href="/assets/css/admin-premium-nutrition-plan.css"></head>
<body><main class="wrap" id="nutritionPlanApp">
  <header class="plan-header"><a class="back-link" href="/admin-premium-workspace.html" id="backToRecord">← Voltar ao prontuário</a><p class="eyebrow">LM Premium 3.0</p><h1>Planejamento alimentar</h1><h2 id="studentName">Carregando aluno…</h2><p id="studentContext" class="muted">Carregando contexto do acompanhamento…</p><div id="planStatus" class="status-pill" role="status" aria-live="polite">Carregando…</div></header>
  <p id="status" class="notice" role="status" aria-live="polite"></p>
  <section id="emptyState" hidden></section>
  <section id="currentSection" hidden><h2>Plano atual</h2><div id="current"></div></section>
  <section id="editorSection" hidden><form id="draftForm" novalidate><div id="validationSummary" class="validation-summary" role="alert" hidden></div><div id="directionForm"></div><div class="section-heading"><div><h2>Refeições</h2><p class="muted">Monte as refeições, alimentos e substituições do aluno.</p></div><button type="button" class="secondary" id="addMeal">+ Adicionar refeição</button></div><div id="mealsEditor"></div></form></section>
  <section><h2>Histórico de versões</h2><div id="history"></div></section>
  <div id="actionBar" class="action-bar" hidden></div>
  <dialog id="reviewModal" aria-labelledby="reviewTitle"><div class="modal-head"><h2 id="reviewTitle">Revisar planejamento</h2><button type="button" class="icon-button" id="closeReview" aria-label="Fechar revisão">×</button></div><div id="reviewContent"></div><div class="modal-actions"><button type="button" class="secondary" id="editReview">Voltar e editar</button><button type="button" id="confirmPublish">Publicar planejamento</button></div></dialog>
  <section id="publishedConfirmation" hidden></section>
</main><script src="/assets/js/admin-auth.js"></script><script type="module" src="/assets/js/admin-premium-nutrition-plan.js"></script></body></html>
