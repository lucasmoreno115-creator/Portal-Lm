<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>LM Portal • Redirecionando</title>
    <meta http-equiv="refresh" content="0; url=portal-login.html" />
    <style>
      :root {
        color-scheme: dark;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: radial-gradient(circle at top, #1a1f2e 0%, #0d1117 45%, #070a10 100%);
        color: #e6edf3;
        font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen,
          Ubuntu, Cantarell, "Helvetica Neue", Arial, sans-serif;
      }

      main {
        width: min(92vw, 560px);
        padding: 2rem 1.75rem;
        border: 1px solid rgba(255, 255, 255, 0.08);
        border-radius: 16px;
        background: rgba(13, 17, 23, 0.72);
        backdrop-filter: blur(8px);
        text-align: center;
        box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
      }

      h1 {
        margin: 0 0 0.75rem;
        font-size: clamp(1.1rem, 2.6vw, 1.35rem);
        font-weight: 600;
      }

      p {
        margin: 0;
        color: #b6c2cf;
        line-height: 1.5;
      }

      a {
        color: #7cc0ff;
        text-decoration: none;
        font-weight: 600;
      }

      a:hover,
      a:focus-visible {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Redirecionando para o Portal LM...</h1>
      <p>
        Se não acontecer automaticamente,
        <a href="portal-login.html">Clique aqui para acessar o Portal LM</a>.
      </p>
    </main>
  </body>
</html>
