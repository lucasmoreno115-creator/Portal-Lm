<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Workspace Premium</title>
  <link rel="canonical" href="/admin">
  <link rel="stylesheet" href="assets/css/admin-premium-workspace.css">
</head>
<body>
  <main class="workspace minimal-workspace" data-admin-shell="premium-workspace">
    <header class="top minimal-top" aria-label="Workspace Premium">
      <div>
        <p>LM Premium</p>
        <h1>Workspace Premium</h1>
      </div>
      <label class="search">Buscar aluno
        <input id="search" placeholder="Nome ou e-mail" autocomplete="off">
      </label>
      <nav aria-label="Ações do Workspace">
        <button id="refresh" type="button">Atualizar</button>
        <button id="adminLogoutBtn" type="button">Sair</button>
      </nav>
      <span id="loading" role="status" aria-live="polite" hidden>Carregando...</span>
    </header>

    <section id="flag" class="panel" hidden>Workspace desligado por feature flag.</section>
    <section id="error" class="panel error" hidden><span id="errorText"></span><button id="retry" type="button">Tentar novamente</button></section>

    <div class="layout minimal-layout">
      <section id="students" class="panel"><h2>Alunos Premium</h2><div id="studentList" class="list skeleton">Carregando alunos... Nenhum aluno Premium encontrado.</div><button id="loadMore" type="button" hidden>Carregar mais</button></section>
      <section id="context" class="panel context"><h2>Contexto básico</h2><div id="contextBody">Selecione um aluno para visualizar o contexto básico.</div></section>
    </div>
  </main>
  <script src="assets/js/admin-auth.js"></script>
  <script src="assets/js/admin-premium-workspace.js"></script>
</body>
</html>
