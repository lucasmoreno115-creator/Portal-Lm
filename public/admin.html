<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Workspace Premium</title>
  <link rel="stylesheet" href="assets/css/portal.css">
</head>
<body>
  <main class="container">
    <section class="card hero">
      <p class="eyebrow">LM Premium • Workspace</p>
      <h1>Abrindo Workspace Premium</h1>
      <p id="adminEntryStatus" class="status muted" role="status" aria-live="polite">Verificando sessão administrativa...</p>
    </section>
  </main>
  <script src="assets/js/admin-auth.js"></script>
  <script>
(function(){
  const workspace='/admin-premium-workspace.html';
  const status=document.getElementById('adminEntryStatus');
  if(window.LMAdminAuth?.getAdminSession?.()){
    status.textContent='Sessão válida. Abrindo Workspace Premium...';
    window.location.replace(workspace);
    return;
  }
  status.textContent='Sessão necessária. Abrindo login administrativo...';
  window.location.replace(window.LMAdminAuth?.getAdminLoginUrl?.(workspace)||`/admin-login.html?returnTo=${encodeURIComponent(workspace)}`);
})();
  </script>
</body>
</html>
