<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Admin LM Premium</title>
  <link rel="stylesheet" href="assets/css/portal.css">
</head>
<body>
  <main class="container">
    <section class="card hero">
      <p class="eyebrow">LM Premium 3.0 • Admin</p>
      <h1>Admin LM Premium</h1>
      <p id="adminCutoverStatus" class="status muted" role="status" aria-live="polite">Verificando rota administrativa oficial...</p>
      <p><a id="fallbackLegacyLink" href="admin-legacy.html">Abrir Admin legado</a></p>
    </section>
  </main>
  <script src="assets/js/admin-auth.js"></script>
  <script>
(function(){
  const status=document.getElementById('adminCutoverStatus');
  const legacy='admin-legacy.html';
  const workspace='admin-premium-workspace.html';
  async function decide(){
    try{
      const response=await fetch('/api/admin/premium/cutover-route',{headers:window.LMAdminAuth?.getAdminAuthHeaders?.()||{}});
      const payload=await response.json();
      const target=payload?.data?.target||legacy;
      status.textContent=payload?.data?.cutoverEnabled?'Abrindo Workspace Premium oficial...':'Abrindo Admin legado por flag de cutover desligada...';
      window.location.replace(target);
    }catch(error){
      status.textContent='Não foi possível verificar o cutover. Abrindo Admin legado real.';
      window.location.replace(legacy);
    }
  }
  decide();
})();
  </script>
</body>
</html>
