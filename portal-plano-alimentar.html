<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>Plano Alimentar</title>
  <link rel='stylesheet' href='portal.css'>
</head>
<body>
  <div class='container'>
    <div id='nav'></div>

    <section class='card hero'>
      <p class='eyebrow'>Consultoria LM</p>
      <h1>Plano Alimentar</h1>
      <p class='hero-subtext'>Sua estratégia nutricional atual organizada de forma simples para facilitar a execução no dia a dia.</p>
    </section>

    <section id='contentCard' class='card'>
      <p id='statusText' class='muted'>Carregando seu plano alimentar...</p>
      <div id='planContent' hidden></div>
      <div id='pdfActions' hidden style='margin-top:16px;'>
        <button id='downloadPdfBtn' type='button' class='primary-cta'>Baixar planejamento completo (PDF)</button>
      </div>
    </section>
  </div>

  <script src='portal-shared.js'></script>
  <script>
    requireAuth();
    document.getElementById('nav').innerHTML = nav();

    const statusText = document.getElementById('statusText');
    const planContent = document.getElementById('planContent');
    const pdfActions = document.getElementById('pdfActions');
    const downloadPdfBtn = document.getElementById('downloadPdfBtn');

    function escapeHtml(value) {
      return String(value || '')
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;')
        .replace(/'/g, '&#39;');
    }

    function renderList(items) {
      return `<ul class='mission-list'>${items.map((item) => `<li>${escapeHtml(item)}</li>`).join('')}</ul>`;
    }

    function renderTextBlock(text) {
      return `<p style='white-space: pre-line;'>${escapeHtml(text)}</p>`;
    }

    function normalizeLineItems(value) {
      const stripMarker = (line) => line.replace(/^\s*(?:[-•*]\s+|\d+[.)]\s+)/, '').trim();
      const splitLines = (text) => String(text || '').split(/\r?\n/).map((line) => stripMarker(line)).filter(Boolean);

      if (Array.isArray(value)) {
        return value.flatMap((item) => splitLines(item)).filter(Boolean);
      }

      return splitLines(value);
    }

    function renderTextOrList(value) {
      const lines = normalizeLineItems(value);
      if (!lines.length) return '';
      return lines.length > 1 ? renderList(lines) : renderTextBlock(lines[0]);
    }


    const equivalenceNote = 'As substitui&ccedil;&otilde;es s&atilde;o aproxima&ccedil;&otilde;es pr&aacute;ticas. O objetivo &eacute; manter prote&iacute;na alta, carboidrato controlado e boa ades&atilde;o alimentar.';

    function renderFoodEquivalences(substitutions) {
      if (!Array.isArray(substitutions) || !substitutions.length) return '';
      const modernItems = substitutions.filter((item) => item && typeof item === 'object' && 'category' in item && 'reference' in item);
      if (!modernItems.length) {
        return substitutions.map((sub) => `
          <article class='equivalence-card'>
            <div class='equivalence-card-title'>
              <span class='equivalence-icon'>*</span>
              <h3>${escapeHtml(sub?.title || 'Substituicao')}</h3>
            </div>
            ${renderTextBlock(Array.isArray(sub?.items) ? String(sub.items[0] || '') : '')}
          </article>
        `).join('');
      }
      return modernItems.map((category) => `
        <article class='equivalence-card'>
          <div class='equivalence-card-title'>
            <span class='equivalence-icon'>${escapeHtml(category.icon || '*')}</span>
            <h3>${escapeHtml(category.category || 'Categoria')}</h3>
          </div>
          <p class='equivalence-reference'>${escapeHtml(category.reference || '')}</p>
          ${renderList(Array.isArray(category.items) ? category.items : [])}
        </article>
      `).join('');
    }

    function sectionHtml(title, content) {
      if (!content) return '';
      return `<section class='card'><h2>${title}</h2>${content}</section>`;
    }

    function renderPlan(plan) {
      const strategyGoalHtml = plan.goal
        ? `<div><p class='eyebrow'>Objetivo atual</p>${renderTextBlock(plan.goal)}</div>`
        : '';
      const strategyFocusHtml = (() => {
        const focusHtml = renderTextOrList(plan.strategy);
        if (!focusHtml) return '';
        return `<div><p class='eyebrow'>Foco da fase</p>${focusHtml}</div>`;
      })();
      const strategyHtml = strategyGoalHtml || strategyFocusHtml
        ? `${strategyGoalHtml}${strategyFocusHtml}`
        : '<p class="muted">Sem estrat&eacute;gia cadastrada.</p>';

      const mealsHtml = (plan.meals || []).map((meal) => `
        <article class='meal-card'>
          <h3>${escapeHtml(meal?.name || 'Refeicao')}</h3>
          ${renderTextBlock(Array.isArray(meal?.items) ? String(meal.items[0] || '') : '')}
        </article>
      `).join('');

      const substitutionsHtml = renderFoodEquivalences(plan.substitutions || []);
      const adherenceRulesHtml = renderTextOrList(plan.adherence_rules);
      const message = encodeURIComponent(plan.whatsapp_message || 'Ola, estou com duvida sobre meu plano alimentar no Portal LM.');

      planContent.innerHTML = `
        ${sectionHtml('Estrat&eacute;gia atual', strategyHtml)}

        ${sectionHtml('Refei&ccedil;&otilde;es do plano', mealsHtml ? `<div class='grid'>${mealsHtml}</div>` : '<p class="muted">Sem refei&ccedil;&otilde;es cadastradas.</p>')}

        ${sectionHtml('Guia de Equival&ecirc;ncias Alimentares', substitutionsHtml ? `<div class='equivalence-grid'>${substitutionsHtml}</div><p class='equivalence-note'>${equivalenceNote}</p>` : '<p class="muted">Sem equival&ecirc;ncias cadastradas.</p>')}

        ${sectionHtml('Regras de ades&atilde;o', adherenceRulesHtml || '<p class="muted">Sem regras cadastradas.</p>')}

        ${sectionHtml('Observa&ccedil;&otilde;es', plan.notes ? renderTextBlock(plan.notes) : '<p class="muted">Sem observa&ccedil;&otilde;es.</p>')}

        <section class='card support-card'>
          <h2>Suporte</h2>
          <p class='muted'>Se surgiu qualquer d&uacute;vida na execu&ccedil;&atilde;o, pe&ccedil;a orienta&ccedil;&atilde;o antes de ajustar por conta pr&oacute;pria.</p>
          <a class='primary-cta' href='https://wa.me/5514991174500?text=${message}' target='_blank' rel='noopener noreferrer'>Tenho d&uacute;vida sobre meu plano</a>
        </section>
      `;

      statusText.hidden = true;
      planContent.hidden = false;
    }

    function downloadPlanPdf() {
      downloadPdfBtn.disabled = true;
      const originalText = downloadPdfBtn.textContent;
      downloadPdfBtn.textContent = 'Abrindo versao para impressao...';

      try {
        const printWindow = window.open('portal-plano-alimentar-print.html', '_blank', 'noopener,noreferrer');
        if (!printWindow) {
          window.location.href = 'portal-plano-alimentar-print.html';
        }
      } catch (error) {
        alert(error.message || 'Nao foi possivel abrir a versao de impressao.');
      } finally {
        window.setTimeout(() => {
          downloadPdfBtn.disabled = false;
          downloadPdfBtn.textContent = originalText;
        }, 500);
      }
  } catch (error) {
    alert(error.message || 'Não foi possível abrir a versão de impressão.');
  } finally {
    window.setTimeout(() => {
      downloadPdfBtn.disabled = false;
      downloadPdfBtn.textContent = originalText;
    }, 500);
  }
}
    downloadPdfBtn.addEventListener('click', downloadPlanPdf);

    async function loadPlan() {
      try {
        const response = await api('/portal/nutrition-plan');

        if (!response?.data) {
          statusText.textContent = 'Seu plano alimentar ainda não foi liberado no portal. Assim que estiver disponível, ele aparecerá aqui.';
          statusText.className = 'status muted';
          return;
        }

        renderPlan(response.data);
        pdfActions.hidden = false;
      } catch (error) {
        statusText.textContent = 'Não foi possível carregar seu plano alimentar agora. Tente novamente em instantes.';
        statusText.className = 'status error';
      }
    }

    loadPlan();
  </script>
</body>
</html>
