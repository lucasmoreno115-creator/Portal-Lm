<!doctype html>
<html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>LM Portal Login</title><link rel='stylesheet' href='portal.css'></head>
<body><div class='container'><div class='card'><h1>Área do Aluno — Método LM</h1><p class='muted'>Acesse seu acompanhamento, check-in e ferramentas de progressão.</p><label>Email<input id='email' type='email'></label><label>Token de acesso<input id='token' type='text'></label><button id='entrar'>Entrar no Portal</button><p id='msg'></p></div></div>
<script src='portal-shared.js'></script><script>
const emailEl=document.getElementById('email'),tokenEl=document.getElementById('token'),msg=document.getElementById('msg');
function saveStudentSession(data, token){localStorage.setItem('lm_student_email',data.email);localStorage.setItem('lm_student_token',token);localStorage.setItem('lm_student_name',data.name||'Aluno');localStorage.setItem('lm_student_plan',data.plan||data.planType||'premium');localStorage.setItem('lm_student_plan_type',data.planType||data.plan||'premium');}
document.getElementById('entrar').onclick=async()=>{const email=emailEl.value.trim().toLowerCase(),token=tokenEl.value.trim();msg.textContent='';msg.className='';let r;try{r=await api('/portal/login',{method:'POST',body:JSON.stringify({email,token}),headers:{}});}catch(_){msg.className='error';msg.textContent='Não foi possível acessar. Verifique email e token.';return;}saveStudentSession(r.data,token);const initialTarget=r.data.plan==='projeto_lm'?'/projeto-lm/':'portal.html';if(r.data.plan==='projeto_lm'){window.location.href=initialTarget;return;}try{const access=await api('/portal/premium/access-state');window.location.href=access.data.experience==='PREMIUM_PORTAL'?'portal-premium-home.html':'portal-premium-onboarding.html';}catch(_){msg.className='error';msg.textContent='Seu acesso foi validado, mas o Portal está temporariamente indisponível. Tente novamente em instantes.';}};
</script></body></html>
