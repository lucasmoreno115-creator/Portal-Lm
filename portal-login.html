<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>LM Portal Login</title><link rel='stylesheet' href='portal.css'></head><body><div class='container'><div class='card'><h1>Área do Aluno — Método LM</h1><p class='muted'>Acesse seu acompanhamento, check-in e ferramentas de progressão.</p><label>Email<input id='email' type='email'></label><label>Token de acesso<input id='token' type='text'></label><button id='entrar'>Entrar no Portal</button><p id='msg'></p></div></div><script src='portal-shared.js'></script><script>
document.getElementById('entrar').onclick=async()=>{const email=emailEl.value.trim().toLowerCase();const token=tokenEl.value.trim();msg.textContent='';try{const r=await api('/portal/login',{method:'POST',body:JSON.stringify({email,token}),headers:{}});localStorage.setItem('lm_student_email',r.data.email);localStorage.setItem('lm_student_token',token);localStorage.setItem('lm_student_name',r.data.name||'Aluno');localStorage.setItem('lm_student_plan',r.data.plan||r.data.planType||'premium');localStorage.setItem('lm_student_plan_type',r.data.planType||r.data.plan||'premium');window.location.href=(r.data.plan==='projeto_lm'?'public/project-lm-2.html':'portal.html');}catch(e){msg.className='error';msg.textContent='Não foi possível acessar. Verifique email e token.';}};
const emailEl=document.getElementById('email'),tokenEl=document.getElementById('token'),msg=document.getElementById('msg');
</script></body></html>
