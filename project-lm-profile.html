<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>Perfil — Projeto LM</title>
  <link rel='stylesheet' href='portal.css'>
  <link rel='stylesheet' href='project-lm.css'>
</head>
<body class='portal-home-v7 projeto-lm-profile-page'>
  <main class='container home-main'>
    <section class='card hero hero-premium onboarding-intro-card'>
      <p class='eyebrow'>Projeto LM</p>
      <h1>Vamos montar sua direção inicial</h1>
      <p class='hero-subtext'>Nos próximos 30 dias,<br>o objetivo não é ser perfeito.<br><br>É continuar.<br><br>Preencha seus dados iniciais para liberar seu planejamento.</p>
    </section>

    <form id='projectLmProfileForm' class='profile-choice-form' aria-label='Perfil Projeto LM'>
      <section class='card dashboard-card profile-fields-card'>
        <label class='profile-field'>
          <span>Nome</span>
          <input type='text' name='name' autocomplete='name' required>
        </label>
        <label class='profile-field'>
          <span>Objetivo</span>
          <input type='text' name='objective' placeholder='Ex.: emagrecer com constância' required>
        </label>
        <label class='profile-field'>
          <span>Sexo</span>
          <select name='sex' required>
            <option value=''>Selecione</option>
            <option value='female'>Feminino</option>
            <option value='male'>Masculino</option>
          </select>
        </label>
        <label class='profile-field'>
          <span>Peso (kg)</span>
          <input type='number' name='weightKg' inputmode='decimal' min='30.1' max='249.9' step='0.1' placeholder='72,5' required>
        </label>
        <label class='profile-field'>
          <span>Altura (cm)</span>
          <input type='text' name='heightCm' inputmode='numeric' placeholder='170' required>
        </label>
      </section>
      <div class='profile-submit-card'>
        <button id='submitProjectLmProfile' class='primary-cta' type='submit'>Começar minha jornada</button>
        <p id='profileStatus' class='muted' role='status' aria-live='polite'></p>
      </div>
    </form>
  </main>
  <script src='public/assets/js/lm-access.js?v=20260623-1'></script>
  <script src='portal-shared.js'></script>
  <script src='project-lm-profile.js'></script>
</body>
</html>
