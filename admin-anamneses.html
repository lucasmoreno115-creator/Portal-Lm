<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Admin • Anamneses Premium</title><link rel='stylesheet' href='portal.css'></head><body><div class='container'><section class='card hero'><p class='eyebrow'>Consultoria LM • Admin Hub</p><h1>Anamnese Premium</h1><p class='hero-title'>Visualize avaliações recebidas e marque como analisadas.</p></section><section class='card'><label>Token admin<input id='adminToken' type='password' required></label><button id='loadBtn'>Carregar anamneses</button><p id='status' class='status muted'>Insira o token para listar.</p></section><section class='card'><h2>Recebidas</h2><div id='list'></div></section><section class='card'><h2>Detalhes</h2><div id='details' class='muted'>Selecione uma anamnese da lista.</div></section></div><script>
const loadBtn=document.getElementById('loadBtn'),status=document.getElementById('status'),list=document.getElementById('list'),details=document.getElementById('details'),adminToken=document.getElementById('adminToken');
let items=[];
function fmt(v){return v?new Date(v).toLocaleString('pt-BR'):'-'}
function escapeHtml(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;')}
function snakeToLabel(key){return String(key||'').replaceAll(/[_-]+/g,' ').replaceAll(/\s+/g,' ').trim().replace(/\b\w/g,c=>c.toUpperCase())||'-'}
function formatValue(v){if(v===null||v===undefined||v==='')return '-';if(Array.isArray(v))return v.length?v.map(formatValue).join(', '):'-';if(typeof v==='object')return Object.entries(v).map(([k,val])=>`${snakeToLabel(k)}: ${formatValue(val)}`).join(' • ');if(typeof v==='boolean')return v?'Sim':'Não';return escapeHtml(v)}
function fieldRow(key,value){return `<div class='an-field'><p class='an-label'>${snakeToLabel(key)}</p><p class='an-value'>${formatValue(value)}</p></div>`}
function cardSection(icon,title,obj){const rows=Object.entries(obj||{}).map(([k,v])=>fieldRow(k,v)).join('')||`<p class='muted'>Sem dados deste bloco.</p>`;return `<article class='card an-card'><h3>${icon} ${title}</h3><div class='an-fields'>${rows}</div></article>`}
function pickFirst(answers,paths){for(const path of paths){const parts=path.split('.');let cur=answers;for(const part of parts){cur=cur?.[part]}if(cur!==undefined&&cur!==null&&cur!=='')return cur}return '-'}
function strategicSummary(answers){const mainGoal=pickFirst(answers,['objectives.main_goal','objectives.primary_goal','metadata.main_goal','behavior.goal']);const biggestDifficulty=pickFirst(answers,['adherence.biggest_difficulty','behavior.biggest_difficulty','routine.difficulty','nutrition.biggest_difficulty']);const trainingFrequency=pickFirst(answers,['training.frequency','training.weekly_frequency','routine.training_frequency']);const sleepQuality=pickFirst(answers,['sleep.sleep_quality','routine.sleep_quality','recovery.sleep_quality','emotional.sleep_quality']);const clinicalAlert=pickFirst(answers,['clinical.main_alert','clinical.alerts','clinical.red_flags','clinical.diagnosis']);
return `<article class='card an-summary'><h3>Resumo estratégico</h3><div class='an-summary-grid'>${fieldRow('objetivo_principal',mainGoal)}${fieldRow('maior_dificuldade',biggestDifficulty)}${fieldRow('frequencia_de_treino',trainingFrequency)}${fieldRow('qualidade_do_sono',sleepQuality)}${fieldRow('principal_alerta_clinico',clinicalAlert)}</div></article>`}
function renderClinicalSheet(answers){const source=answers||{};const groups=[{icon:'👤',title:'Dados pessoais',keys:['personal','personal_data','metadata']},{icon:'🍽',title:'Alimentação',keys:['nutrition','food','feeding']},{icon:'🏋️',title:'Treino',keys:['training','workout']},{icon:'😴',title:'Sono e recuperação',keys:['sleep','recovery']},{icon:'💼',title:'Rotina',keys:['routine','behavior']},{icon:'⚕️',title:'Histórico clínico',keys:['clinical','health_history']},{icon:'🎯',title:'Objetivos',keys:['objectives','goals','adherence']},{icon:'📋',title:'Observações',keys:['observations','notes','emotional']}];
const cards=groups.map(g=>{let block={};for(const k of g.keys){if(source[k]&&typeof source[k]==='object'){block={...block,...source[k]}}}return cardSection(g.icon,g.title,block)}).join('');
return `<div class='an-layout'>${strategicSummary(source)}<section class='an-grid'>${cards}</section></div>`}

async function fetchJson(url,opt={}){const r=await fetch(url,{...opt,headers:{'Content-Type':'application/json','x-admin-token':adminToken.value.trim(),...(opt.headers||{})}});const p=await r.json().catch(()=>null);if(!r.ok||!p?.ok)throw new Error(p?.error||'Erro');return p.data}
function renderList(){list.innerHTML=items.map(i=>`<button class='secondary-link' data-id='${i.id}' style='display:block;margin:8px 0;text-align:left'>${i.student_name||'Sem nome'} • ${i.student_email||'-'} • ${i.status} • ${fmt(i.created_at)}</button>`).join('')||'<p class="muted">Sem anamneses.</p>';list.querySelectorAll('button[data-id]').forEach(b=>b.onclick=()=>loadDetail(b.dataset.id));}
async function load(){status.textContent='Carregando...';try{items=await fetchJson('/api/admin/anamneses');renderList();status.textContent=`${items.length} anamneses carregadas.`;status.className='status ok';}catch(e){status.textContent=e.message;status.className='status error';}}
async function loadDetail(id){details.textContent='Carregando detalhe...';try{const d=await fetchJson(`/api/admin/anamneses/${id}`);details.innerHTML=`<style>.an-layout{display:grid;gap:14px}.an-summary-grid,.an-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.an-card h3,.an-summary h3{margin-bottom:10px}.an-fields{display:grid;gap:8px}.an-field{padding:10px;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(255,255,255,.02)}.an-label{font-size:.78rem;color:#9aa2b1;text-transform:none;margin:0 0 4px}.an-value{font-size:.98rem;color:#eaf0ff;margin:0;word-break:break-word}@media (max-width:640px){.an-summary-grid,.an-grid{grid-template-columns:1fr}}</style><p><strong>${d.student_name||'-'}</strong> • ${d.student_email||'-'} • ${d.student_phone||'-'}</p><p>Status: <strong>${d.status}</strong> | Recebida: ${fmt(d.created_at)}</p><button id='markBtn'>Marcar como analisada</button>${renderClinicalSheet(d.answers)}${cardSection('🧮','Scores internos',d.internal_scores)}`;document.getElementById('markBtn').onclick=async()=>{await fetchJson('/api/admin/anamneses/'+id,{method:'PATCH',body:JSON.stringify({status:'ANALISADA'})});await load();await loadDetail(id);};}catch(e){details.textContent=e.message;}}
loadBtn.onclick=load;
</script></body></html>
