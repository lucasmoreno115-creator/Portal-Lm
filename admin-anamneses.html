<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Admin • Anamneses Premium</title><link rel='stylesheet' href='portal.css'></head><body><div class='container'>
    <nav><button id='adminLogoutBtn' type='button'>Sair</button><a href='/admin.html'>← Voltar ao Admin Hub</a><a href='/admin-command-center.html'>Abrir Command Center</a><a href='/admin-student.html'>Abrir Student 360</a></nav><section class='card hero'><p class='eyebrow'>Consultoria LM • Admin Hub</p><h1>Anamnese Premium</h1><p class='hero-title'>Visualize avaliações recebidas e marque como analisadas.</p></section><section class='card'><label>Token admin<input id='adminToken' type='password' required></label><button id='loadBtn'>Carregar anamneses</button><p id='status' class='status muted'>Insira o token para listar.</p></section><section class='card'><h2>Recebidas</h2><div id='list'></div></section><section class='card'><h2>Detalhes</h2><div id='details' class='muted'>Selecione uma anamnese da lista.</div></section></div><script src='/admin-auth.js'></script>
  <script>
window.LMAdminAuth.requireAdmin();
window.LMAdminAuth.hydrateAdminTokenInput('adminToken');
window.LMAdminAuth.attachLogout('adminLogoutBtn');
</script>
<script>
const loadBtn=document.getElementById('loadBtn'),status=document.getElementById('status'),list=document.getElementById('list'),details=document.getElementById('details'),adminToken=document.getElementById('adminToken');let items=[];
const emptyLabel='Não informado';
function fmt(v){return v?new Date(v).toLocaleString('pt-BR'):emptyLabel}
function escapeHtml(v){return String(v??'').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;').replaceAll('"','&quot;').replaceAll("'",'&#39;')}
function snakeToLabel(k){const map={email:'Email',weighs_food:'Pesa os alimentos',meals_per_day:'Refeições por dia',days_per_week:'Dias por semana',time_training:'Tempo de treino',cardio:'Cardio',self_evaluation:'Organização alimentar'};if(map[k])return map[k];return String(k||'').replaceAll(/[_-]+/g,' ').replaceAll(/\s+/g,' ').trim().replace(/\b\w/g,c=>c.toUpperCase())||emptyLabel}
function formatValue(v){if(v===null||v===undefined||v==='')return emptyLabel;if(Array.isArray(v))return v.length?v.map(formatValue).join(', '):emptyLabel;if(typeof v==='object')return Object.entries(v).map(([k,val])=>`${snakeToLabel(k)}: ${formatValue(val)}`).join(' • ');if(typeof v==='boolean')return v?'Sim':'Não';return escapeHtml(v)}
function fieldRow(k,v){return `<div class='an-field'><p class='an-label'>${snakeToLabel(k)}</p><p class='an-value'>${formatValue(v)}</p></div>`}
function cardSection(icon,title,obj){const rows=Object.entries(obj||{}).map(([k,v])=>fieldRow(k,v)).join('')||`<p class='muted'>Sem dados deste bloco.</p>`;return `<article class='card an-card'><h3>${icon} ${title}</h3><div class='an-fields'>${rows}</div></article>`}
function scoreLabel(key){return {adherence_score:'Adesão',risk_score:'Risco',routine_score:'Rotina',recovery_score:'Recuperação'}[key]||snakeToLabel(key)}
function classifyScore(key,value){if(value===null||value===undefined||value==='')return emptyLabel;const n=Number(value);if(!Number.isFinite(n))return emptyLabel;if(key==='risk_score'){if(n<=3)return 'Baixo risco';if(n<=6)return 'Atenção';return 'Alto risco'}if(n<=3)return 'Baixo';if(n<=6)return 'Moderado';return 'Alto'}
function formatScore(key,value){if(value===null||value===undefined||value==='')return emptyLabel;const n=Number(value);if(!Number.isFinite(n))return formatValue(value);return `${Math.round(n)}/10 • ${classifyScore(key,n)}`}
function scoreRow(key,value){return `<div class='an-field'><p class='an-label'>${scoreLabel(key)}</p><p class='an-value'>${formatScore(key,value)}</p></div>`}
function renderInternalScores(scores){const normalized=scores&&typeof scores==='object'?scores:{};const keys=['adherence_score','risk_score','routine_score','recovery_score'];const rows=keys.map(k=>scoreRow(k,normalized[k])).join('');return `<article class='card an-card'><h3>🧮 Scores internos</h3><div class='an-fields'>${rows}</div></article>`}
function hasAnyScore(scores){const keys=['adherence_score','risk_score','routine_score','recovery_score'];return !!(scores&&typeof scores==='object'&&keys.some(k=>typeof scores[k]==='number'&&Number.isFinite(scores[k])))}
function calculateScoresFallback(answers){const a=answers&&typeof answers==='object'?answers:{};return {adherence_score:scoreAverage([scoreNumber(scorePick(a,['adherence.change_readiness','adherence.readiness','change_readiness'])),scoreBarrier(scorePick(a,['adherence.consistency_barrier','adherence.difficulty','consistency_barrier']),true),scoreFrequency(scorePick(a,['nutrition.weighs_food','weighs_food']),true),scoreOrganization(scorePick(a,['nutrition.self_evaluation','self_evaluation'])),scoreFrequency(scorePick(a,['nutrition.off_plan_frequency','off_plan_frequency']),false),scoreFrequency(scorePick(a,['nutrition.stress_eating','stress_eating']),false),scoreFrequency(scorePick(a,['nutrition.binge_episodes','binge_episodes']),false)]),risk_score:scoreAverage([scoreFrequency(scorePick(a,['nutrition.binge_episodes','binge_episodes']),true),scoreFrequency(scorePick(a,['nutrition.stress_eating','stress_eating']),true),scoreNumber(scorePick(a,['recovery.stress_level','stress_level'])),scoreSleepQuality(scorePick(a,['recovery.sleep_quality','sleep.sleep_quality','sleep_quality']),true),scoreBarrier(scorePick(a,['adherence.consistency_barrier','adherence.difficulty','consistency_barrier']),false),scoreMedical(scorePick(a,['training.injuries_pain','injuries_pain'])),scoreMedical(scorePick(a,['health.conditions','clinical.conditions','conditions'])),scoreMedical(scorePick(a,['health.medications','clinical.medications','medications'])),scoreMedical(scorePick(a,['health.hormones','clinical.hormones','hormones']))]),routine_score:scoreAverage([scoreYesNo(scorePick(a,['routine.allows_planning','routine.availability','allows_planning']),10,2,6),scoreRoutineText(scorePick(a,['routine.work_hours','routine.flow','flow','work_hours'])),scoreBarrier(scorePick(a,['routine.organization_barrier','organization_barrier']),true),scoreYesNo(scorePick(a,['routine.prepares_meals','prepares_meals']),10,3,6),scoreYesNo(scorePick(a,['nutrition.defined_schedule','defined_schedule']),10,2,6),scoreMeals(scorePick(a,['nutrition.meals_per_day','meals_per_day']))]),recovery_score:scoreAverage([scoreSleepQuality(scorePick(a,['recovery.sleep_quality','sleep.sleep_quality','sleep_quality'])),scoreSleepHours(scorePick(a,['recovery.sleep_hours','sleep.hours','sleep_hours'])),scoreNumber(scorePick(a,['recovery.stress_level','stress_level']),true),scoreNumber(scorePick(a,['recovery.daily_energy','daily_energy'])),scoreYesNo(scorePick(a,['recovery.wakes_rested','wakes_rested']),10,2,6)])}}
function scorePick(source,paths){for(const p of paths){let cur=source;for(const part of p.split('.'))cur=cur?.[part];if(cur!==undefined&&cur!==null&&cur!=='')return cur}return null}
function scoreAverage(values){const valid=values.filter(Number.isFinite);return valid.length>=2?Math.max(0,Math.min(10,Math.round(valid.reduce((s,v)=>s+v,0)/valid.length))):null}
function scoreText(v){return String(Array.isArray(v)?v.join(' '):(v??'')).trim().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g,'')}
function scoreNumber(v,invert=false){if(v===null||v===undefined||v==='')return null;const n=Number(String(v).replace(',','.'));if(!Number.isFinite(n))return null;const c=Math.max(0,Math.min(10,n));return invert?10-c:c}
function scoreYesNo(v,yes=10,no=0,sometimes=5){const t=scoreText(v);if(!t)return null;if(t.includes('as vezes')||t.includes('parcial'))return sometimes;if(t.includes('sim')||t.includes('consigo'))return yes;if(t.includes('nao')||t.includes('nunca'))return no;return null}
function scoreFrequency(v,positive=true){const t=scoreText(v);if(!t)return null;let risk;if(t.includes('quase nunca')||t.includes('nunca')||t.includes('nao'))risk=0;else if(t.includes('as vezes')||t.includes('1-2')||t.includes('1 a 2')||t.includes('pouco'))risk=3;else if(t.includes('3-4')||t.includes('3 a 4')||t.includes('moderad')||t.includes('razoavel'))risk=6;else if(t.includes('sim')||t.includes('5 ou mais')||t.includes('frequent')||t.includes('sempre')||t.includes('muito'))risk=9;else return null;return positive?risk:10-risk}
function scoreOrganization(v){const t=scoreText(v);if(!t)return null;if(t.includes('muito desorganizada'))return 1;if(t.includes('pouco organizada'))return 3;if(t.includes('razoavelmente organizada'))return 6;if(t.includes('bem organizada'))return 8;if(t.includes('muito organizada'))return 10;return null}
function scoreSleepQuality(v,invert=false){const t=scoreText(v);if(!t)return null;let s=null;if(t.includes('muito ruim')||t.includes('pessim'))s=1;else if(t.includes('ruim'))s=3;else if(t.includes('regular')||t.includes('razoavel'))s=5;else if(t.includes('boa')||t.includes('bom'))s=8;else if(t.includes('excelente')||t.includes('muito boa'))s=10;return s===null?null:(invert?10-s:s)}
function scoreSleepHours(v){const m=String(v??'').match(/\d+(?:[,.]\d+)?/);if(!m)return null;const h=Number(m[0].replace(',','.'));if(!Number.isFinite(h))return null;if(h>=7&&h<=9)return 10;if(h>=6&&h<7)return 7;if(h>=5&&h<6)return 4;if(h>9&&h<=10)return 7;return 2}
function scoreMeals(v){const t=scoreText(v);if(!t)return null;if(t.includes('1-2')||t.includes('1 a 2'))return 3;if(t.includes('3 refei'))return 7;if(t.includes('4 refei')||t.includes('5 refei'))return 10;if(t.includes('6 ou mais'))return 8;return null}
function scoreRoutineText(v){const t=scoreText(v);if(!t)return null;if(t.includes('organizada')||t.includes('previsivel')||t.includes('flexivel')||t.includes('tranquil'))return 9;if(t.includes('corrida')||t.includes('imprevisivel')||t.includes('caotica')||t.includes('plantao')||t.includes('escala'))return 3;if(t.includes('razoavel')||t.includes('regular'))return 6;return null}
function scoreBarrier(v,invert=false){const t=scoreText(v);if(!t)return null;let b;if(t.includes('nenhum')||t.includes('sem barreira')||t.includes('nao tenho'))b=0;else if(t.includes('pouco')||t.includes('pequeno'))b=3;else if(t.includes('tempo')||t.includes('rotina')||t.includes('organiz')||t.includes('ansiedade')||t.includes('estresse'))b=6;else if(t.includes('muito')||t.includes('sempre')||t.includes('compuls')||t.includes('lesao')||t.includes('dor'))b=8;else b=5;return invert?10-b:b}
function scoreMedical(v){const t=scoreText(v);if(!t)return null;if(t.includes('nenhum')||t.includes('nao')||t.includes('sem '))return 0;if(t.includes('grave')||t.includes('cron')||t.includes('lesao')||t.includes('dor'))return 8;return 5}
function pickFirst(answers,paths){for(const p of paths){let cur=answers;for(const part of p.split('.'))cur=cur?.[part];if(cur!==undefined&&cur!==null&&cur!=='')return cur}return emptyLabel}
function buildRisk(answers){const readiness=Number(pickFirst(answers,['adherence.change_readiness','adherence.readiness']));const planability=String(pickFirst(answers,['routine.allows_planning','routine.availability'])).toLowerCase();const barrier=String(pickFirst(answers,['adherence.consistency_barrier','adherence.difficulty','nutrition.biggest_difficulty'])).toLowerCase();if(Number.isFinite(readiness)&&readiness<=3)return '🔴 Alto';if(Number.isFinite(readiness)&&readiness<=6)return '🟡 Médio';if(planability.includes('não')||barrier.includes('tempo')||barrier.includes('rotina'))return '🟡 Médio';return '🟢 Baixo'}
function strategicSummary(a){const objective=pickFirst(a,['objectives.main_goal','objectives.primary_goal','goals.main_goal','behavior.goal']);const limiter=pickFirst(a,['adherence.consistency_barrier','adherence.biggest_difficulty','nutrition.biggest_difficulty','routine.organization_barrier']);const priority=pickFirst(a,['nutrition.biggest_difficulty','routine.organization_barrier','training.injuries_pain']);const trainingFreq=pickFirst(a,['training.days_per_week','training.time_training','training.cardio','training.frequency','training.weekly_frequency']);const foodOrg=pickFirst(a,['nutrition.self_evaluation','nutrition.weighs_food','nutrition.meals_per_day','nutrition.defined_schedule','nutrition.off_plan_frequency']);const recovery=pickFirst(a,['recovery.sleep_quality','recovery.sleep_hours','sleep.sleep_quality']);const routineComplexity=pickFirst(a,['routine.allows_planning','routine.work_hours','routine.flow']);const churnRisk=buildRisk(a);const systemRec=pickFirst(a,['metadata.system_recommended','metadata.form_version','metadata.source']);
return `<article class='card an-summary'><h3>Resumo estratégico</h3><div class='an-summary-grid'>${fieldRow('🎯 objetivo principal',objective)}${fieldRow('⚠️ principal limitador',limiter)}${fieldRow('🔥 prioridade inicial',priority)}${fieldRow('🏋️ frequência de treino',trainingFreq)}${fieldRow('🍽 organização alimentar',foodOrg)}${fieldRow('😴 recuperação',recovery)}${fieldRow('💼 complexidade da rotina',routineComplexity)}${fieldRow('🟢🟡🔴 risco de abandono',churnRisk)}${fieldRow('📈 sistema recomendado',systemRec)}</div></article>`}
function renderClinicalSheet(answers){const s=answers||{};const groups=[{icon:'👤',title:'Dados pessoais',keys:['personal','personal_data','metadata']},{icon:'🎯',title:'Objetivo',keys:['objectives','goals']},{icon:'⚖️',title:'Histórico de peso',keys:['weight_history']},{icon:'🏋️',title:'Treinamento',keys:['training','workout']},{icon:'🍽',title:'Alimentação',keys:['nutrition','food']},{icon:'😴',title:'Sono e recuperação',keys:['recovery','sleep']},{icon:'💼',title:'Rotina',keys:['routine']},{icon:'⚕️',title:'Saúde',keys:['health','clinical']},{icon:'🧠',title:'Adesão e comportamento',keys:['adherence','behavior']},{icon:'📝',title:'Observações finais',keys:['observations','notes','emotional']}];
return `<div class='an-layout'>${strategicSummary(s)}<section class='an-grid'>${groups.map(g=>{let b={};for(const k of g.keys){if(s[k]&&typeof s[k]==='object')b={...b,...s[k]}}return cardSection(g.icon,g.title,b)}).join('')}</section></div>`}
async function fetchJson(url,opt={}){const r=await fetch(url,{...opt,headers:{'Content-Type':'application/json','x-admin-token':adminToken.value.trim(),...(opt.headers||{})}});const p=await r.json().catch(()=>null);if(!r.ok||!p?.ok)throw new Error(p?.error||'Erro');return p.data}
function renderList(){list.innerHTML=items.map(i=>`<button class='secondary-link' data-id='${i.id}' style='display:block;margin:8px 0;text-align:left'>${i.student_name||'Sem nome'} • ${i.student_email||emptyLabel} • ${i.status} • ${fmt(i.created_at)}</button>`).join('')||'<p class="muted">Sem anamneses.</p>';list.querySelectorAll('button[data-id]').forEach(b=>b.onclick=()=>loadDetail(b.dataset.id));}
async function load(){status.textContent='Carregando...';try{items=await fetchJson('/api/admin/anamneses');renderList();status.textContent=`${items.length} anamneses carregadas.`;status.className='status ok'}catch(e){status.textContent=e.message;status.className='status error'}}
async function loadDetail(id){details.textContent='Carregando detalhe...';try{const d=await fetchJson(`/api/admin/anamneses/${id}`);const scores=hasAnyScore(d.internal_scores)?d.internal_scores:calculateScoresFallback(d.answers);details.innerHTML=`<style>.an-layout{display:grid;gap:14px}.an-summary-grid,.an-grid{display:grid;gap:12px;grid-template-columns:repeat(auto-fit,minmax(220px,1fr))}.an-card h3,.an-summary h3{margin-bottom:10px}.an-fields{display:grid;gap:8px}.an-field{padding:10px;border:1px solid rgba(255,255,255,.08);border-radius:10px;background:rgba(255,255,255,.02)}.an-label{font-size:.78rem;color:#9aa2b1;text-transform:none;margin:0 0 4px}.an-value{font-size:.98rem;color:#eaf0ff;margin:0;word-break:break-word}@media (max-width:640px){.an-summary-grid,.an-grid{grid-template-columns:1fr}}</style><p><strong>${d.student_name||emptyLabel}</strong> • ${d.student_email||emptyLabel} • ${d.student_phone||emptyLabel}</p><p>Status: <strong>${d.status}</strong> | Recebida: ${fmt(d.created_at)}</p><button id='markBtn'>Marcar como analisada</button>${renderClinicalSheet(d.answers)}${renderInternalScores(scores)}`;document.getElementById('markBtn').onclick=async()=>{await fetchJson('/api/admin/anamneses/'+id,{method:'PATCH',body:JSON.stringify({status:'ANALISADA'})});await load();await loadDetail(id);}}catch(e){details.textContent=e.message}}
loadBtn.onclick=load;
</script></body></html>
