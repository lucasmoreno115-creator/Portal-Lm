<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Admin • Anamneses Premium</title><link rel='stylesheet' href='portal.css'></head><body><div class='container'><section class='card hero'><p class='eyebrow'>Consultoria LM • Admin Hub</p><h1>Anamnese Premium</h1><p class='hero-title'>Visualize avaliações recebidas e marque como analisadas.</p></section><section class='card'><label>Token admin<input id='adminToken' type='password' required></label><button id='loadBtn'>Carregar anamneses</button><p id='status' class='status muted'>Insira o token para listar.</p></section><section class='card'><h2>Recebidas</h2><div id='list'></div></section><section class='card'><h2>Detalhes</h2><div id='details' class='muted'>Selecione uma anamnese da lista.</div></section></div><script>
const loadBtn=document.getElementById('loadBtn'),status=document.getElementById('status'),list=document.getElementById('list'),details=document.getElementById('details'),adminToken=document.getElementById('adminToken');
let items=[];
function fmt(v){return v?new Date(v).toLocaleString('pt-BR'):'-'}
function sec(title,obj){return `<h3>${title}</h3><pre class='status' style='white-space:pre-wrap'>${JSON.stringify(obj||{},null,2)}</pre>`}
async function fetchJson(url,opt={}){const r=await fetch(url,{...opt,headers:{'Content-Type':'application/json','x-admin-token':adminToken.value.trim(),...(opt.headers||{})}});const p=await r.json().catch(()=>null);if(!r.ok||!p?.ok)throw new Error(p?.error||'Erro');return p.data}
function renderList(){list.innerHTML=items.map(i=>`<button class='secondary-link' data-id='${i.id}' style='display:block;margin:8px 0;text-align:left'>${i.student_name||'Sem nome'} • ${i.student_email||'-'} • ${i.status} • ${fmt(i.created_at)}</button>`).join('')||'<p class="muted">Sem anamneses.</p>';list.querySelectorAll('button[data-id]').forEach(b=>b.onclick=()=>loadDetail(b.dataset.id));}
async function load(){status.textContent='Carregando...';try{items=await fetchJson('/api/admin/anamneses');renderList();status.textContent=`${items.length} anamneses carregadas.`;status.className='status ok';}catch(e){status.textContent=e.message;status.className='status error';}}
async function loadDetail(id){details.textContent='Carregando detalhe...';try{const d=await fetchJson(`/api/admin/anamneses/${id}`);details.innerHTML=`<p><strong>${d.student_name||'-'}</strong> • ${d.student_email||'-'} • ${d.student_phone||'-'}</p><p>Status: <strong>${d.status}</strong> | Recebida: ${fmt(d.created_at)}</p><button id='markBtn'>Marcar como analisada</button>${sec('Emocional',d.answers?.emotional)}${sec('Comportamento',d.answers?.behavior)}${sec('Rotina',d.answers?.routine)}${sec('Treino',d.answers?.training)}${sec('Clínico',d.answers?.clinical)}${sec('Nutrição',d.answers?.nutrition)}${sec('Adesão',d.answers?.adherence)}${sec('Metadados',d.answers?.metadata)}${sec('Scores internos',d.internal_scores)}`;document.getElementById('markBtn').onclick=async()=>{await fetchJson('/api/admin/anamneses/'+id,{method:'PATCH',body:JSON.stringify({status:'ANALISADA'})});await load();await loadDetail(id);};}catch(e){details.textContent=e.message;}}
loadBtn.onclick=load;
</script></body></html>
