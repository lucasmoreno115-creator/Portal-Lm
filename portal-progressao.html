<!doctype html>
<html>
<head>
  <meta charset='utf-8'>
  <meta name='viewport' content='width=device-width,initial-scale=1'>
  <title>Progressão</title>
  <link rel='stylesheet' href='portal.css'>
</head>
<body>
  <div class='container'>
    <div id='nav'></div>

    <div class='card'>
      <h1>Calculadora de Progressão LM</h1>
      <p class='muted'>Use esta calculadora após registrar a última série válida do exercício. Informe a carga usada, a faixa alvo e quantas repetições realizou com boa execução. O sistema indicará se você deve subir carga, manter a carga ou ajustar a execução na próxima sessão.</p>
      <div class='grid'>
        <label>Exercício<input id='exercise' required></label>
        <label>Faixa alvo de repetições
          <select id='zone'><option>6–8</option><option>8–10</option><option>10–12</option><option>12–15</option><option>15–20</option></select>
        </label>
        <label>Carga usada<input id='load' type='number' step='0.1' required></label>
        <label>Repetições realizadas<input id='reps' type='number' required></label>
        <label>Execução manteve boa qualidade?
          <select id='executionQuality'><option>Sim</option><option>Não</option></select>
        </label>
      </div>
      <button id='calc'>Calcular</button>
      <div id='out' class='card' style='display:none'></div>
      <button id='save' style='display:none'>Salvar progressão</button>
    </div>

    <div class='card'><h2>Histórico</h2><div id='hist'></div></div>
  </div>

  <script src='portal-shared.js'></script>
  <script>
    const navEl = document.getElementById('nav');
    const zone = document.getElementById('zone');
    const reps = document.getElementById('reps');
    const calc = document.getElementById('calc');
    const out = document.getElementById('out');
    const save = document.getElementById('save');
    const exercise = document.getElementById('exercise');
    const load = document.getElementById('load');
    const hist = document.getElementById('hist');
    const executionQuality = document.getElementById('executionQuality');

    requireAuth();
    navEl.innerHTML = nav();

    let current = null;

    function decide() {
      if (!exercise.value || !load.value || !reps.value) {
        alert('Preencha exercício, carga e repetições.');
        return;
      }

      const [min, max] = zone.value.split('–').map(Number);
      const repsDone = Number(reps.value);
      const isGoodExecution = executionQuality.value === 'Sim';

      let recommendation = 'Manter carga e buscar mais repetições';
      let message = 'Você está dentro da faixa alvo. Mantenha a mesma carga na próxima sessão e tente fazer 1 repetição a mais com boa execução.';
      let suggestion = 'Mantenha a carga e busque progredir em repetições.';
      let status = 'status-warn';

      // Regra de prioridade 1: execução ruim sempre bloqueia subida de carga.
      if (!isGoodExecution) {
        recommendation = 'Não subir carga ainda';
        message = 'A execução perdeu qualidade. Mantenha ou reduza levemente a carga e priorize amplitude, controle e técnica perfeita antes de progredir.';
        suggestion = 'Priorize técnica, amplitude e controle antes de aumentar carga.';
        status = 'status-danger';
      } else if (repsDone <= min - 3) {
        recommendation = 'Carga provavelmente alta demais';
        message = 'A carga parece alta demais para a faixa proposta. Reduza a carga na próxima sessão para conseguir executar dentro da zona alvo com controle.';
        suggestion = 'Reduza cerca de 2–5% e volte para dentro da faixa alvo.';
        status = 'status-danger';
      } else if (repsDone < min) {
        recommendation = 'Reduzir carga ou manter com ajuste técnico';
        message = 'Você ficou abaixo da faixa alvo. Reduza levemente a carga ou mantenha apenas se a execução estiver boa e o objetivo for adaptação. A prioridade agora é voltar para dentro da faixa.';
        suggestion = 'Reduza cerca de 2–5%, se necessário.';
        status = 'status-danger';
      } else if (repsDone >= min && repsDone < max) {
        recommendation = 'Manter carga e buscar mais repetições';
        message = 'Você está dentro da faixa alvo. Mantenha a mesma carga na próxima sessão e tente fazer 1 repetição a mais com boa execução.';
        suggestion = 'Mantenha a carga e busque progredir em repetições.';
        status = 'status-warn';
      } else if (repsDone >= max) {
        recommendation = 'Subir carga na próxima sessão';
        if (repsDone > max) {
          message = 'Você passou da faixa alvo com boa execução. A carga ficou leve para o objetivo atual. Suba a carga na próxima sessão.';
        } else {
          message = 'Você atingiu o topo da faixa com boa execução. Na próxima sessão, aumente a carga levemente e tente permanecer dentro da faixa alvo.';
        }
        suggestion = 'Exercícios grandes: +5%. Isoladores: +2–5%.';
        status = 'status-ok';
      }

      out.style.display = 'block';
      save.style.display = 'block';
      out.className = `card ${status}`;
      out.innerHTML = `<h3>${recommendation}</h3><p>${message}</p><p><strong>Sugestão:</strong> ${suggestion}</p>`;

      current = {
        exercise: exercise.value,
        targetZone: zone.value,
        loadUsed: load.value,
        repsDone: reps.value,
        executionQuality: executionQuality.value,
        recommendation
      };
    }

    calc.onclick = decide;

    save.onclick = async () => {
      try {
        await api('/portal/progression', { method: 'POST', body: JSON.stringify(current) });
        loadHist();
      } catch (e) {
        alert(e.message);
      }
    };

    async function loadHist() {
      const r = await api('/portal/progression');
      hist.innerHTML = (r.data || []).map(i => {
        const rec = i.recommendation || i.decision || 'Sem recomendação';
        const quality = i.executionQuality ? ` · Execução: ${i.executionQuality}` : '';
        const legacyRir = i.rir ? ` · RIR legado: ${i.rir}` : '';
        return `<div class='status'>${i.created_at} · ${i.exercise} · ${i.targetZone || '-'} · ${i.loadUsed || '-'}kg · ${i.repsDone || '-'} reps${quality} · ${rec}${legacyRir}</div>`;
      }).join('') || 'Sem histórico';
    }

    loadHist();
  </script>
</body>
</html>
