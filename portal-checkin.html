<!doctype html><html><head><meta charset='utf-8'><meta name='viewport' content='width=device-width,initial-scale=1'><title>Check-in LM</title><link rel='stylesheet' href='portal.css'></head><body><div class='container'><div id='nav'></div><div class='card'><h1>Check-in semanal</h1><form id='f' class='grid'></form><button id='send'>Enviar check-in</button><p id='msg'></p></div><div class='card'><h2>Histórico</h2><div id='hist'></div></div></div><script src='portal-shared.js'></script><script>
requireAuth();navEl.innerHTML=nav();
const fields=[['trainingAdherence',['100%','75–90%','50–75%','<50%']],['nutritionAdherence',['Excelente','Boa','Média','Baixa']],['cardioAdherence',['Sim','Parcialmente','Não']],['freeMeals',['Nenhuma','1–2','3–4','Mais de 4']],['hungerLevel',['Muito controlada','Normal','Alta','Muito alta']],['bingeOrSnacking',['Não','Leve','Moderado','Forte']],['sleepQuality',['Excelente','Bom','Regular','Ruim']],['energyLevel',['Alto','Normal','Baixo','Muito baixo']],['stressLevel',['Baixo','Moderado','Alto','Muito alto']],['weeklyWeight',null],['waist',null],['strengthStatus',['Melhorou','Manteve','Caiu']],['mainDifficulty',null],['routineContext',null],['weeklyScore',null],['supportNeeded',['Não','Sim um pouco','Sim bastante']]];
for (const [k,opts] of fields){const d=document.createElement('div');d.innerHTML=`<label>${k}${opts?`<select name='${k}'>${opts.map(o=>`<option>${o}</option>`).join('')}</select>`:`<input name='${k}' />`}</label>`;f.appendChild(d)}
send.onclick=async()=>{const data=Object.fromEntries(new FormData(f).entries());try{await api('/portal/checkin',{method:'POST',body:JSON.stringify(data)});msg.className='ok';msg.textContent='Check-in enviado com sucesso';load();}catch(e){msg.className='error';msg.textContent=e.message}};
async function load(){const r=await api('/portal/checkins');hist.innerHTML=(r.data||[]).map(c=>`<div class='status'>${c.created_at} · Score ${c.weekly_score||'-'} · Dificuldade: ${c.main_difficulty||'-'}</div>`).join('')||'Sem histórico';}
const navEl=document.getElementById('nav'),f=document.getElementById('f'),send=document.getElementById('send'),msg=document.getElementById('msg'),hist=document.getElementById('hist');load();
</script></body></html>
