name: Premium Nutrition Plan Legacy Repository Association
on:
  workflow_dispatch:
    inputs:
      mode:
        description: dry-run, apply, or rollback
        required: true
        type: choice
        options: [dry-run, apply, rollback]
      confirmation:
        description: Type APPLY_PREMIUM_NUTRITION_PLAN_LEGACY_REPOSITORY_ASSOCIATION
        required: true
        type: string
      operation_id:
        description: Required only for rollback.
        required: false
        type: string
permissions:
  contents: read
jobs:
  associate:
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
      ASSOCIATION_MODE: ${{ inputs.mode }}
      ASSOCIATION_CONFIRMATION: ${{ inputs.confirmation }}
      ASSOCIATION_OPERATION_ID: ${{ inputs.operation_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Run individually validated legacy repository association
        run: node scripts/run-premium-nutrition-plan-legacy-repository-association.mjs > premium-nutrition-plan-legacy-repository-association.json
      - uses: actions/upload-artifact@v4
        with:
          name: premium-nutrition-plan-legacy-repository-association
          path: premium-nutrition-plan-legacy-repository-association.json
          retention-days: 1
      - name: Publish sanitized summary
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const { mode, summary } = JSON.parse(fs.readFileSync('premium-nutrition-plan-legacy-repository-association.json', 'utf8'));
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, ['## Premium Nutrition Plan Legacy Repository Association', '', `mode: ${mode}`, ...['candidates', 'applied', 'rolled_back', 'blocked', 'errors'].map((key) => `${key}: ${summary[key]}`), ''].join('\n'));
          NODE
