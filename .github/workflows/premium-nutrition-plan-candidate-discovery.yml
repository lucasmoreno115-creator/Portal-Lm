name: Premium Nutrition Plan Candidate Discovery

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  discover:
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Run read-only candidate discovery
        run: node scripts/diagnose-premium-nutrition-plan-candidates.mjs > premium-nutrition-plan-candidates.json
      - uses: actions/upload-artifact@v4
        with:
          name: premium-nutrition-plan-candidates
          path: premium-nutrition-plan-candidates.json
          retention-days: 1
      - name: Publish aggregate summary only
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const { summary } = JSON.parse(fs.readFileSync('premium-nutrition-plan-candidates.json', 'utf8'));
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, ['## Premium Nutrition Plan Candidate Discovery', '', ...Object.entries(summary).map(([key, value]) => `${key}: ${value}`), ''].join('\n'));
          NODE
