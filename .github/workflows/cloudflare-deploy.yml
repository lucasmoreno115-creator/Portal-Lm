name: Deploy Cloudflare Worker

on:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: cloudflare-production
  cancel-in-progress: false

jobs:
  quality:
    name: Runtime sync and tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check Project LM runtime sync
        run: npm run check:project-lm-runtime

      - name: Validate public runtime imports
        run: node --test tests/project-lm-runtime-sync.test.mjs tests/v4-dependency-inventory.test.mjs

      - name: Run test suite
        run: npm test

      - name: Ensure clean working tree
        run: git diff --exit-code

  deploy:
    name: Deploy production Worker and assets
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    environment:
      name: production

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy with pinned Wrangler
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          wranglerVersion: 4.65.0
          command: deploy

      - name: Verify production health
        env:
          PORTAL_HEALTH_URL: https://portal.lucasmorenopersonal.com.br/api/health
        run: |
          set -euo pipefail

          for attempt in 1 2 3 4 5; do
            echo "Production health check attempt ${attempt}/5: $PORTAL_HEALTH_URL"
            if response="$(curl --fail --silent --show-error --max-time 10 "$PORTAL_HEALTH_URL")"; then
              node -e '
                const payload = JSON.parse(process.argv[1]);
                if (payload.ok !== true || payload.service !== "lm-system-api") process.exit(1);
              ' "$response"
              echo "Production health check passed."
              exit 0
            fi

            if [ "$attempt" -lt 5 ]; then
              sleep 5
            fi
          done

          echo "Production health check failed."
          exit 1
