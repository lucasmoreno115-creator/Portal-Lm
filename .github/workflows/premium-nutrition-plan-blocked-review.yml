name: Premium Nutrition Plan Blocked Review
on:
  workflow_dispatch:
permissions:
  contents: read
jobs:
  review:
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Run read-only blocked review
        run: node scripts/diagnose-premium-nutrition-plan-blocked-review.mjs > premium-nutrition-plan-blocked-review.json
      - uses: actions/upload-artifact@v4
        with:
          name: premium-nutrition-plan-blocked-review
          path: premium-nutrition-plan-blocked-review.json
          retention-days: 1
      - name: Publish aggregate summary only
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';

          const report = JSON.parse(
            fs.readFileSync('premium-nutrition-plan-blocked-review.json', 'utf8')
          );
          const summary = report.summary;
          fs.appendFileSync(
            process.env.GITHUB_STEP_SUMMARY,
            ['## Premium Nutrition Plan Blocked Review', '', ...Object.entries(summary).map(([key, value]) => `${key}: ${value}`), ''].join('\n')
          );
          NODE
