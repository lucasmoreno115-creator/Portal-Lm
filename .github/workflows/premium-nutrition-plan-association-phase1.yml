name: Premium Nutrition Plan Association Phase 1
on:
  workflow_dispatch:
    inputs:
      mode:
        description: dry-run, apply, or rollback
        required: true
        type: choice
        options: [dry-run, apply, rollback]
      confirmation:
        description: Type APPLY_PREMIUM_NUTRITION_PLAN_ASSOCIATION_PHASE1
        required: true
        type: string
      operation_id:
        description: Required only for rollback; ignored for apply unless supplied.
        required: false
        type: string
permissions:
  contents: read
jobs:
  associate:
    if: github.ref == 'refs/heads/main'
    environment: production
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_D1_API_TOKEN: ${{ secrets.CLOUDFLARE_D1_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      CLOUDFLARE_D1_DATABASE_ID: ${{ vars.CLOUDFLARE_D1_DATABASE_ID }}
      ASSOCIATION_MODE: ${{ inputs.mode }}
      ASSOCIATION_CONFIRMATION: ${{ inputs.confirmation }}
      ASSOCIATION_OPERATION_ID: ${{ inputs.operation_id }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22 }
      - name: Run individually validated association operation
        run: node scripts/run-premium-nutrition-plan-association-phase1.mjs > premium-nutrition-plan-association-phase1.json
      - uses: actions/upload-artifact@v4
        with:
          name: premium-nutrition-plan-association-phase1
          path: premium-nutrition-plan-association-phase1.json
          retention-days: 1
      - name: Publish sanitized summary
        run: |
          node --input-type=module <<'NODE'
          import fs from 'node:fs';
          const { mode, operation_id, summary } = JSON.parse(fs.readFileSync('premium-nutrition-plan-association-phase1.json', 'utf8'));
          fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY, ['## Premium Nutrition Plan Association Phase 1', '', `mode: ${mode}`, `operation_id: ${operation_id ?? 'none'}`, ...Object.entries(summary).map(([key, value]) => `${key}: ${value}`), ''].join('\n'));
          NODE
